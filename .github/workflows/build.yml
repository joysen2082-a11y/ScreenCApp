name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download and use Gradle 8.5
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug --no-daemon --warning-mode all

      - name: Locate APK files
        run: |
          echo "=== 查找 APK ==="
          find . -name "*.apk" -type f
          echo "=== 构建输出目录 ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "无 apk 目录"
          ls -laR app/build/outputs/ 2>/dev/null | head -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCaptureApp-debug
          path: "**/*.apk"
